<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Duck Evolution · Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      background: #0b0f15;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      margin: 0;
      overflow-x: hidden;
    }
    .game-container {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(145deg, #1a1f2b 0%, #10141c 100%);
      border-radius: 48px;
      padding: 24px 18px 28px;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(120, 140, 170, 0.25);
    }
    .balance-section {
      background: #1e2530;
      border-radius: 60px;
      padding: 12px 32px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.5);
      margin-bottom: 18px;
      border: 1px solid rgba(255,200,80,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .coin-icon {
      font-size: 26px;
    }
    .balance-amount {
      font-size: 40px;
      font-weight: 800;
      color: #f8e3a0;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      letter-spacing: 1px;
    }
    .duck-area {
      margin: 8px 0 18px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
      background: radial-gradient(circle at 50% 30%, #2a3340, #141b24);
      border-radius: 80px;
      padding: 20px 40px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), inset 0 -4px 6px rgba(0,0,0,0.5);
      border: 2px solid #4a5462;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .duck-area:active {
      transform: scale(0.94);
    }
    .duck-emoji {
      font-size: 110px;
      display: block;
      filter: drop-shadow(0 12px 14px rgba(0,0,0,0.7)) drop-shadow(0 0 14px #ffd966);
      transition: all 0.15s;
      line-height: 1;
    }
    .duck-area:active .duck-emoji {
      transform: translateY(-6px) scale(1.08);
      filter: drop-shadow(0 18px 18px rgba(0,0,0,0.8)) drop-shadow(0 0 22px #fbbf24);
    }
    .click-hint {
      color: #a0b3cc;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .passive-income-badge {
      background: #2d3a4a;
      border-radius: 24px;
      padding: 6px 16px;
      color: #d4e0f0;
      font-size: 13px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #5a6a7e;
    }
    .energy-bar-container {
      width: 100%;
      background: #1f2937;
      border-radius: 30px;
      height: 22px;
      margin: 10px 0 16px;
      box-shadow: inset 0 3px 7px rgba(0,0,0,0.7);
      border: 1px solid #3c4455;
      overflow: hidden;
      position: relative;
    }
    .energy-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706);
      border-radius: 30px;
      box-shadow: 0 0 12px #f59e0b;
      transition: width 0.2s ease-out;
    }
    .energy-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: 700;
      color: #0b0f15;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
      white-space: nowrap;
    }
    .actions {
      width: 100%;
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }
    .btn {
      background: #2d3748;
      border: none;
      border-radius: 40px;
      padding: 16px 0;
      font-weight: 700;
      font-size: 17px;
      color: #e2e8f0;
      background: linear-gradient(180deg, #323e50 0%, #1f2937 100%);
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
      flex: 1;
      transition: all 0.15s;
      cursor: pointer;
      letter-spacing: 0.5px;
      border: 1px solid #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.6);
      background: linear-gradient(180deg, #1f2937 0%, #161e2a 100%);
    }
    .shop-btn {
      background: linear-gradient(180deg, #4b3a5c 0%, #2d2138 100%);
      border-color: #a78bfa;
      color: #ede9fe;
    }
    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #1a202c;
      max-width: 350px;
      width: 85%;
      border-radius: 44px;
      padding: 28px 20px 28px;
      border: 1px solid #5a6377;
      box-shadow: 0 35px 55px rgba(0,0,0,0.8);
      text-align: center;
      color: #f1f5f9;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-content h2 {
      font-size: 26px;
      margin-bottom: 18px;
      color: #fbbf24;
    }
    .shop-item {
      background: #232b38;
      border-radius: 28px;
      padding: 18px;
      margin: 14px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #434f60;
      flex-wrap: wrap;
      gap: 8px;
    }
    .upgrade-info {
      text-align: left;
      flex: 1;
    }
    .upgrade-name {
      font-weight: 700;
      font-size: 18px;
    }
    .upgrade-desc {
      font-size: 13px;
      color: #b9c7dd;
    }
    .buy-btn {
      background: #f59e0b;
      border: none;
      border-radius: 30px;
      padding: 12px 18px;
      font-weight: bold;
      color: #0f172a;
      background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
      box-shadow: 0 6px 12px rgba(245,158,11,0.4);
      cursor: pointer;
      transition: 0.12s;
      white-space: nowrap;
    }
    .buy-btn:active {
      transform: scale(0.94);
    }
    .close-btn {
      margin-top: 16px;
      background: #2d3748;
      border-radius: 40px;
      padding: 14px;
      font-weight: bold;
      width: 100%;
      border: none;
      color: white;
      cursor: pointer;
      background: linear-gradient(180deg, #3f4b5c 0%, #252e3b 100%);
    }
    .per-tap-indicator {
      font-size: 13px;
      color: #cdd9f0;
      margin-bottom: 4px;
    }
    /* Всплывающие цифры */
    .float-text {
      position: fixed;
      pointer-events: none;
      font-weight: 800;
      color: #fde047;
      text-shadow: 0 0 12px #f59e0b, 0 2px 6px black;
      font-size: 28px;
      z-index: 999;
      animation: floatUp 0.7s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      70% { opacity: 0.8; transform: translate(-50%, -45px) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -80px) scale(0.6); }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="balance-section">
    <span class="coin-icon">🪙</span>
    <span class="balance-amount" id="coinDisplay">0</span>
  </div>
  <div class="per-tap-indicator" id="perTapDisplay">🦆 +1 за клик</div>

  <!-- Большая утка (эволюционирует) -->
  <div class="duck-area" id="duckButton">
    <span class="duck-emoji" id="duckEmoji">🐣</span>
    <div class="click-hint">КЛИКАЙ УТКУ</div>
  </div>

  <!-- Отображение пассивного дохода -->
  <div class="passive-income-badge" id="passiveBadge" style="display: none;">
    <span>⏳</span> <span id="passiveAmount">0</span> монет/сек
  </div>

  <!-- Прогресс-бар энергии -->
  <div class="energy-bar-container">
    <div class="energy-fill" id="energyFill" style="width: 100%;"></div>
    <div class="energy-text" id="energyText">100/100</div>
  </div>

  <div class="actions">
    <button class="btn" id="shopOpenBtn">🛒 Магазин</button>
    <button class="btn shop-btn" id="tgShareBtn">📤 Поделиться</button>
  </div>
</div>

<!-- Модальное окно магазина -->
<div class="modal" id="shopModal">
  <div class="modal-content">
    <h2>🦆 Утиный магазин</h2>

    <!-- Улучшение клика -->
    <div class="shop-item">
      <div class="upgrade-info">
        <div class="upgrade-name">⚡ Улучшение клика</div>
        <div class="upgrade-desc">+1 монета за тап (ур. <span id="currentClickLevel">1</span>)</div>
      </div>
      <button class="buy-btn" id="buyUpgradeBtn">💰 <span id="upgradeCost">50</span></button>
    </div>

    <!-- Авто-сборщик -->
    <div class="shop-item">
      <div class="upgrade-info">
        <div class="upgrade-name">🤖 Авто-сборщик</div>
        <div class="upgrade-desc">+1 монета/сек (ур. <span id="autoLevelDisplay">0</span>)</div>
      </div>
      <button class="buy-btn" id="buyAutoBtn">💰 <span id="autoCost">200</span></button>
    </div>

    <p style="font-size:14px; margin:8px 0; color:#a0b3cc;">
      Текущий бонус за клик: <span id="bonusPerTap">1</span> 🦆<br>
      Пассивный доход: <span id="passiveIncomeDisplay">0</span> монет/сек
    </p>
    <button class="close-btn" id="closeShopBtn">Закрыть</button>
  </div>
</div>

<script>
  (function() {
    // ---------- Telegram Mini App ----------
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand(); // на весь экран
      tg.setHeaderColor('#0b0f15');
      tg.setBackgroundColor('#0b0f15');
      if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();
    }

    // ---------- Игровые переменные ----------
    let coins = 0;
    let energy = 100;
    const MAX_ENERGY = 100;
    let clickLevel = 1;            // стартовый бонус за клик
    let passiveLevel = 0;         // уровень автосборщика
    let passiveIncome = 0;       // монет/сек (равен passiveLevel)
    const ENERGY_REGEN = 2;      // восстановление энергии в секунду

    // Стоимости улучшений
    const CLICK_UPGRADE_BASE = 50;
    const AUTO_UPGRADE_BASE = 200;

    // Эволюция утки: пороги монет и соответствующие эмодзи
    const evolutionStages = [
      { threshold: 0, emoji: '🐣' },
      { threshold: 100, emoji: '🐤' },
      { threshold: 500, emoji: '🦆' },
      { threshold: 2000, emoji: '🦢' },
      { threshold: 10000, emoji: '🦩' },
      { threshold: 50000, emoji: '🦚' },
      { threshold: 250000, emoji: '🦜' },
      { threshold: 1000000, emoji: '🦅' },
      { threshold: 5000000, emoji: '🐉' }
    ];

    // DOM элементы
    const coinDisplay = document.getElementById('coinDisplay');
    const perTapDisplay = document.getElementById('perTapDisplay');
    const duckButton = document.getElementById('duckButton');
    const duckEmoji = document.getElementById('duckEmoji');
    const energyFill = document.getElementById('energyFill');
    const energyText = document.getElementById('energyText');
    const passiveBadge = document.getElementById('passiveBadge');
    const passiveAmountSpan = document.getElementById('passiveAmount');
    const shopModal = document.getElementById('shopModal');
    const closeShopBtn = document.getElementById('closeShopBtn');
    const upgradeCostSpan = document.getElementById('upgradeCost');
    const currentClickLevelSpan = document.getElementById('currentClickLevel');
    const bonusPerTapSpan = document.getElementById('bonusPerTap');
    const autoCostSpan = document.getElementById('autoCost');
    const autoLevelDisplay = document.getElementById('autoLevelDisplay');
    const passiveIncomeDisplay = document.getElementById('passiveIncomeDisplay');

    // Звук
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        console.warn('Web Audio API не поддерживается');
      }
    }
    function playQuack() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(380, now);
      osc.frequency.exponentialRampToValueAtTime(190, now + 0.12);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    // ---------- Сохранение ----------
    function loadGame() {
      try {
        const saved = localStorage.getItem('duck_evo_save');
        if (saved) {
          const data = JSON.parse(saved);
          coins = data.coins ?? 0;
          energy = data.energy ?? MAX_ENERGY;
          clickLevel = data.clickLevel ?? 1;
          passiveLevel = data.passiveLevel ?? 0;
          passiveIncome = passiveLevel; // чтобы не расходилось
          if (energy > MAX_ENERGY) energy = MAX_ENERGY;
          if (energy < 0) energy = 0;
        }
      } catch (e) {}
    }
    function saveGame() {
      try {
        localStorage.setItem('duck_evo_save', JSON.stringify({
          coins, energy, clickLevel, passiveLevel
        }));
      } catch (e) {}
    }

    // ---------- Эволюция утки ----------
    function getCurrentDuckEmoji() {
      let currentEmoji = '🐣';
      for (let i = evolutionStages.length - 1; i >= 0; i--) {
        if (coins >= evolutionStages[i].threshold) {
          currentEmoji = evolutionStages[i].emoji;
          break;
        }
      }
      return currentEmoji;
    }

    // ---------- Всплывающие цифры ----------
    function showFloatingText(x, y, text) {
      const el = document.createElement('div');
      el.className = 'float-text';
      el.textContent = text;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ---------- Обновление UI ----------
    function updateUI() {
      coinDisplay.textContent = Math.floor(coins);
      perTapDisplay.textContent = `🦆 +${clickLevel} за клик`;
      currentClickLevelSpan.textContent = clickLevel;
      bonusPerTapSpan.textContent = clickLevel;
      autoLevelDisplay.textContent = passiveLevel;
      passiveIncomeDisplay.textContent = passiveIncome.toFixed(1);

      // Отображение пассивного дохода
      if (passiveIncome > 0) {
        passiveBadge.style.display = 'flex';
        passiveAmountSpan.textContent = passiveIncome.toFixed(1);
      } else {
        passiveBadge.style.display = 'none';
      }

      // Энергия
      const percent = (energy / MAX_ENERGY) * 100;
      energyFill.style.width = `${percent}%`;
      energyText.textContent = `${Math.floor(energy)}/${MAX_ENERGY}`;

      // Стоимости
      upgradeCostSpan.textContent = getClickUpgradeCost();
      autoCostSpan.textContent = getAutoUpgradeCost();

      // Эволюция утки
      duckEmoji.textContent = getCurrentDuckEmoji();
    }

    function getClickUpgradeCost() {
      return CLICK_UPGRADE_BASE * clickLevel;
    }
    function getAutoUpgradeCost() {
      return AUTO_UPGRADE_BASE * (passiveLevel + 1);
    }

    // ---------- Клик по утке ----------
    function handleDuckClick(e) {
      if (energy < 1) {
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        return;
      }

      // Тратим энергию
      energy = Math.max(0, energy - 1);
      coins += clickLevel;

      // Координаты для всплывающего текста
      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else if (e.changedTouches && e.changedTouches.length > 0) {
        clientX = e.changedTouches[0].clientX;
        clientY = e.changedTouches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      showFloatingText(clientX, clientY - 20, `+${clickLevel}`);

      // Звук и тактильный отклик
      playQuack();
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

      updateUI();
      saveGame();
    }

    // ---------- Покупка улучшения клика ----------
    function buyClickUpgrade() {
      const cost = getClickUpgradeCost();
      if (coins < cost) {
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        return;
      }
      coins -= cost;
      clickLevel++;
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      updateUI();
      saveGame();
    }

    // ---------- Покупка автосборщика ----------
    function buyAutoUpgrade() {
      const cost = getAutoUpgradeCost();
      if (coins < cost) {
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        return;
      }
      coins -= cost;
      passiveLevel++;
      passiveIncome = passiveLevel; // каждый уровень +1 монета/сек
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      updateUI();
      saveGame();
    }

    // ---------- Регенерация и пассивный доход ----------
    let lastTimestamp = Date.now();
    function gameLoop() {
      const now = Date.now();
      const deltaSec = (now - lastTimestamp) / 1000;
      if (deltaSec > 0) {
        // Регенерация энергии
        if (energy < MAX_ENERGY) {
          energy = Math.min(MAX_ENERGY, energy + ENERGY_REGEN * deltaSec);
        }
        // Пассивный доход
        if (passiveIncome > 0 && deltaSec > 0) {
          coins += passiveIncome * deltaSec;
        }
        updateUI();
        saveGame();
      }
      lastTimestamp = now;
      requestAnimationFrame(gameLoop);
    }

    // ---------- Модальное окно ----------
    function openShop() {
      shopModal.classList.add('active');
      updateUI();
    }
    function closeShop() {
      shopModal.classList.remove('active');
    }

    // ---------- Поделиться ----------
    function shareGame() {
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent('🦆 Duck Evolution – кликай утку, развивайся и зарабатывай!');
      if (tg) {
        tg.openLink(`https://t.me/share/url?url=${url}&text=${text}`);
      } else {
        window.open(`https://t.me/share/url?url=${url}&text=${text}`, '_blank');
      }
    }

    // ---------- Инициализация событий ----------
    // Обработчики клика
    duckButton.addEventListener('click', handleDuckClick);
    duckButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleDuckClick(e);
    });

    // Кнопки магазина
    document.getElementById('shopOpenBtn').addEventListener('click', openShop);
    closeShopBtn.addEventListener('click', closeShop);
    document.getElementById('buyUpgradeBtn').addEventListener('click', buyClickUpgrade);
    document.getElementById('buyAutoBtn').addEventListener('click', buyAutoUpgrade);

    // Закрытие магазина по клику вне контента
    shopModal.addEventListener('click', (e) => {
      if (e.target === shopModal) closeShop();
    });

    // Поделиться
    document.getElementById('tgShareBtn').addEventListener('click', shareGame);

    // Аудиоконтекст создаётся при первом взаимодействии (политика браузеров)
    document.body.addEventListener('touchstart', initAudio, { once: true });
    document.body.addEventListener('click', initAudio, { once: true });

    // Старт
    loadGame();
    updateUI();
    lastTimestamp = Date.now();
    requestAnimationFrame(gameLoop);

    console.log('🦆 Duck Evolution запущен!');
  })();
</script>
</body>
</html>
