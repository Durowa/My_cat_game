<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Duck Clicker · Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      background: #0b0f15;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
    }
    .game-container {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(145deg, #1a1f2b 0%, #10141c 100%);
      border-radius: 48px;
      padding: 28px 20px 32px;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(120, 140, 170, 0.2);
    }
    .balance-section {
      background: #1e2530;
      border-radius: 60px;
      padding: 14px 32px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.4);
      margin-bottom: 20px;
      border: 1px solid rgba(255,200,80,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: fit-content;
    }
    .coin-icon {
      font-size: 26px;
    }
    .balance-amount {
      font-size: 38px;
      font-weight: 800;
      color: #f8e3a0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }
    .duck-area {
      margin: 10px 0 20px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
      background: radial-gradient(circle at 50% 30%, #2a3340, #141b24);
      border-radius: 80px;
      padding: 25px 40px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.6), inset 0 -4px 6px rgba(0,0,0,0.5);
      border: 2px solid #4a5462;
    }
    .duck-area:active {
      transform: scale(0.93);
    }
    .duck-emoji {
      font-size: 100px;
      display: block;
      filter: drop-shadow(0 12px 14px rgba(0,0,0,0.6)) drop-shadow(0 0 12px #ffd966);
      transition: all 0.15s;
      line-height: 1;
    }
    .duck-area:active .duck-emoji {
      transform: translateY(-6px) scale(1.07);
      filter: drop-shadow(0 18px 18px rgba(0,0,0,0.7)) drop-shadow(0 0 20px #fbbf24);
    }
    .click-hint {
      color: #a0b3cc;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-align: center;
    }
    .energy-bar-container {
      width: 100%;
      background: #1f2937;
      border-radius: 30px;
      height: 22px;
      margin: 12px 0 18px;
      box-shadow: inset 0 3px 7px rgba(0,0,0,0.7);
      border: 1px solid #3c4455;
      overflow: hidden;
      position: relative;
    }
    .energy-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706);
      border-radius: 30px;
      box-shadow: 0 0 12px #f59e0b;
      transition: width 0.2s ease-out;
      position: relative;
    }
    .energy-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: 700;
      color: #0b0f15;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .actions {
      width: 100%;
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      background: #2d3748;
      border: none;
      border-radius: 40px;
      padding: 16px 0;
      font-weight: 700;
      font-size: 18px;
      color: #e2e8f0;
      background: linear-gradient(180deg, #323e50 0%, #1f2937 100%);
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
      flex: 1;
      transition: all 0.15s;
      cursor: pointer;
      letter-spacing: 0.6px;
      border: 1px solid #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.6);
      background: linear-gradient(180deg, #1f2937 0%, #161e2a 100%);
    }
    .shop-btn {
      background: linear-gradient(180deg, #4b3a5c 0%, #2d2138 100%);
      border-color: #a78bfa;
      color: #ede9fe;
    }
    /* Модальное окно магазина */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #1a202c;
      max-width: 340px;
      width: 85%;
      border-radius: 44px;
      padding: 28px 20px 28px;
      border: 1px solid #5a6377;
      box-shadow: 0 35px 55px rgba(0,0,0,0.8);
      text-align: center;
      color: #f1f5f9;
    }
    .modal-content h2 {
      font-size: 26px;
      margin-bottom: 20px;
      color: #fbbf24;
    }
    .shop-item {
      background: #232b38;
      border-radius: 28px;
      padding: 18px;
      margin: 14px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #434f60;
    }
    .upgrade-info {
      text-align: left;
    }
    .upgrade-name {
      font-weight: 700;
      font-size: 18px;
    }
    .upgrade-desc {
      font-size: 13px;
      color: #b9c7dd;
    }
    .buy-btn {
      background: #f59e0b;
      border: none;
      border-radius: 30px;
      padding: 12px 18px;
      font-weight: bold;
      color: #0f172a;
      background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
      box-shadow: 0 6px 12px rgba(245,158,11,0.4);
      cursor: pointer;
      transition: 0.12s;
    }
    .buy-btn:active {
      transform: scale(0.94);
    }
    .close-btn {
      margin-top: 16px;
      background: #3f4b5c;
      border-radius: 40px;
      padding: 14px;
      font-weight: bold;
      width: 100%;
      border: none;
      color: white;
      background: #2d3748;
      cursor: pointer;
    }
    .per-tap-indicator {
      font-size: 13px;
      color: #cdd9f0;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="balance-section">
    <span class="coin-icon">🪙</span>
    <span class="balance-amount" id="coinDisplay">0</span>
  </div>
  <div class="per-tap-indicator" id="perTapDisplay">🦆 +1 за клик</div>

  <!-- Большая утка -->
  <div class="duck-area" id="duckButton">
    <span class="duck-emoji">🦆</span>
    <div class="click-hint">КЛИКАЙ УТКУ</div>
  </div>

  <!-- Прогресс-бар энергии -->
  <div class="energy-bar-container">
    <div class="energy-fill" id="energyFill" style="width: 100%;"></div>
    <div class="energy-text" id="energyText">100/100</div>
  </div>

  <div class="actions">
    <button class="btn" id="shopOpenBtn">🛒 Магазин</button>
    <button class="btn shop-btn" id="tgShareBtn">📤 Поделиться</button>
  </div>
</div>

<!-- Модальное окно магазина -->
<div class="modal" id="shopModal">
  <div class="modal-content">
    <h2>🦆 Утиный магазин</h2>
    <div class="shop-item">
      <div class="upgrade-info">
        <div class="upgrade-name">⚡ Улучшение клика</div>
        <div class="upgrade-desc">+1 монета за тап (сейчас: <span id="currentLevel">1</span>)</div>
      </div>
      <button class="buy-btn" id="buyUpgradeBtn">💰 <span id="upgradeCost">50</span></button>
    </div>
    <p style="font-size:14px; margin:8px 0; color:#a0b3cc;">Текущий бонус: <span id="bonusPerTap">1</span> монет</p>
    <button class="close-btn" id="closeShopBtn">Закрыть</button>
  </div>
</div>

<script>
  (function() {
    // ---------- Telegram Mini App инициализация ----------
    let tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      // Установим цвет фона верхней панели в тон темной теме
      tg.setHeaderColor('#0b0f15');
      tg.setBackgroundColor('#0b0f15');
    }

    // ---------- Игровые переменные ----------
    let coins = 0;
    let energy = 100;
    const MAX_ENERGY = 100;
    // Уровень улучшения клика (начинается с 1 монеты за клик)
    let clickLevel = 1;
    // Базовая стоимость улучшения
    let upgradeBaseCost = 50;

    // Восстановление энергии: 2 единицы в секунду
    const ENERGY_REGEN_PER_SECOND = 2;
    let lastTimestamp = Date.now();

    // Ссылки на DOM элементы
    const coinDisplay = document.getElementById('coinDisplay');
    const perTapDisplay = document.getElementById('perTapDisplay');
    const duckButton = document.getElementById('duckButton');
    const energyFill = document.getElementById('energyFill');
    const energyText = document.getElementById('energyText');
    const shopOpenBtn = document.getElementById('shopOpenBtn');
    const shopModal = document.getElementById('shopModal');
    const closeShopBtn = document.getElementById('closeShopBtn');
    const buyUpgradeBtn = document.getElementById('buyUpgradeBtn');
    const upgradeCostSpan = document.getElementById('upgradeCost');
    const currentLevelSpan = document.getElementById('currentLevel');
    const bonusPerTapSpan = document.getElementById('bonusPerTap');
    const tgShareBtn = document.getElementById('tgShareBtn');

    // ---------- Загрузка сохранения из localStorage ----------
    function loadGame() {
      try {
        const saved = localStorage.getItem('duck_clicker_save');
        if (saved) {
          const data = JSON.parse(saved);
          coins = data.coins ?? 0;
          energy = data.energy ?? MAX_ENERGY;
          clickLevel = data.clickLevel ?? 1;
          upgradeBaseCost = data.upgradeBaseCost ?? 50;
          // Корректировка, чтобы энергия не превышала максимум
          if (energy > MAX_ENERGY) energy = MAX_ENERGY;
          if (energy < 0) energy = 0;
        }
      } catch (e) {
        console.warn('Ошибка загрузки сохранения', e);
      }
    }

    function saveGame() {
      try {
        const data = {
          coins: coins,
          energy: energy,
          clickLevel: clickLevel,
          upgradeBaseCost: upgradeBaseCost
        };
        localStorage.setItem('duck_clicker_save', JSON.stringify(data));
      } catch (e) {}
    }

    // ---------- Обновление интерфейса ----------
    function updateUI() {
      coinDisplay.textContent = Math.floor(coins);
      perTapDisplay.textContent = `🦆 +${clickLevel} за клик`;
      currentLevelSpan.textContent = clickLevel;
      bonusPerTapSpan.textContent = clickLevel;

      // Прогресс-бар энергии
      const percent = (energy / MAX_ENERGY) * 100;
      energyFill.style.width = `${percent}%`;
      energyText.textContent = `${Math.floor(energy)}/${MAX_ENERGY}`;

      // Стоимость улучшения (растёт с уровнем)
      const cost = getUpgradeCost();
      upgradeCostSpan.textContent = cost;
    }

    function getUpgradeCost() {
      // Формула: базовая стоимость * уровень (линейный рост)
      return upgradeBaseCost * clickLevel;
    }

    // ---------- Механика клика по утке ----------
    function handleDuckClick(e) {
      // Проверяем, хватает ли энергии (минимум 1 единица для клика)
      if (energy < 1) {
        // Визуальная обратная связь: показываем, что энергии нет
        duckButton.style.transform = 'scale(0.98)';
        setTimeout(() => { duckButton.style.transform = ''; }, 120);
        if (tg?.HapticFeedback) {
          tg.HapticFeedback.notificationOccurred('error');
        }
        return;
      }

      // Тратим 1 энергию за клик
      energy = Math.max(0, energy - 1);
      // Начисляем монеты согласно уровню улучшения
      coins += clickLevel;

      // Визуальный и тактильный отклик
      if (tg?.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }

      // Небольшая анимация уже через CSS :active, добавим быстрое восстановление стиля
      updateUI();
      saveGame();
    }

    // ---------- Восстановление энергии со временем ----------
    function regenerateEnergy(now) {
      if (lastTimestamp === 0) {
        lastTimestamp = now;
        return;
      }
      const deltaSeconds = (now - lastTimestamp) / 1000;
      if (deltaSeconds > 0 && energy < MAX_ENERGY) {
        const regenAmount = deltaSeconds * ENERGY_REGEN_PER_SECOND;
        energy = Math.min(MAX_ENERGY, energy + regenAmount);
        updateUI();
        saveGame();
      }
      lastTimestamp = now;
    }

    // Игровой цикл для регенерации
    function gameLoop() {
      const now = Date.now();
      regenerateEnergy(now);
      requestAnimationFrame(gameLoop);
    }

    // ---------- Магазин: покупка улучшения ----------
    function buyUpgrade() {
      const cost = getUpgradeCost();
      if (coins < cost) {
        if (tg?.HapticFeedback) {
          tg.HapticFeedback.notificationOccurred('error');
        }
        alert('🦆 Не хватает монет! Кликай утку активнее.');
        return;
      }

      coins -= cost;
      clickLevel += 1;

      if (tg?.HapticFeedback) {
        tg.HapticFeedback.notificationOccurred('success');
      }

      updateUI();
      saveGame();
    }

    // ---------- Управление модальным окном ----------
    function openShop() {
      shopModal.classList.add('active');
      updateUI();
    }

    function closeShop() {
      shopModal.classList.remove('active');
    }

    // ---------- Поделиться (Telegram / соцсети) ----------
    function shareGame() {
      const shareText = `🦆 Утиный кликер! Заработай монеты и прокачай утку. Присоединяйся!`;
      const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(shareText)}`;

      if (tg) {
        // Пытаемся открыть через Telegram (в Mini App может работать ограниченно, но ссылка откроется)
        tg.openLink(shareUrl);
      } else {
        // Фолбэк для браузера
        window.open(shareUrl, '_blank');
      }
    }

    // ---------- Привязка событий ----------
    duckButton.addEventListener('click', handleDuckClick);
    // Также поддерживаем touch для мобильных (не дублирует клик)
    duckButton.addEventListener('touchstart', (e) => {
      e.preventDefault(); // чтобы не было двойного срабатывания на некоторых устройствах
      handleDuckClick(e);
    });

    shopOpenBtn.addEventListener('click', openShop);
    closeShopBtn.addEventListener('click', closeShop);
    buyUpgradeBtn.addEventListener('click', buyUpgrade);

    // Закрытие магазина при клике вне модального контента
    shopModal.addEventListener('click', function(e) {
      if (e.target === shopModal) {
        closeShop();
      }
    });

    tgShareBtn.addEventListener('click', shareGame);

    // ---------- Старт игры ----------
    loadGame();
    updateUI();
    lastTimestamp = Date.now();
    requestAnimationFrame(gameLoop);

    // Дополнительно: синхронизация с Telegram, если нужно показать MainButton (опционально)
    if (tg?.MainButton) {
      // Можно не показывать, но если нужно - раскомментируй:
      // tg.MainButton.setText('🦆 Играть').show().onClick(() => window.scrollTo(0,0));
    }

    // Предотвращение случайного релоада при свайпах вниз (оставим как есть)
    console.log('🦆 Утиный кликер запущен! Telegram Mini App готов.');
  })();
</script>
</body>
</html>
