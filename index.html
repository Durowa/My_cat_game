<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐱 $PURR Clicker</title>
    
    <!-- Подключение Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* ============ БАЗОВЫЕ СТИЛИ ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        
        .app {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            background: linear-gradient(180deg, #000000 0%, #1a0033 50%, #0d001a 100%);
        }
        
        /* ============ HEADER С ТИТУЛОМ ============ */
        .app-header {
            text-align: center;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .listing-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 165, 0, 0.4); }
        }
        
        .passive-income {
            font-size: 13px;
            color: #00ff88;
            margin: 5px 0;
            font-weight: 600;
        }
        
        /* ============ ВЕРХНЯЯ ПАНЕЛЬ ============ */
        .stats-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .league-badge {
            text-align: center;
            font-size: 14px;
            color: #FFD700;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        
        .level-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FF6347);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        
        /* ============ БАЛАНС И ЭНЕРГИЯ ============ */
        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        
        .balance-display {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }
        
        .energy-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .energy-display {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
        }
        
        .energy-bar {
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }
        
        .boost-button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .boost-button:active {
            transform: scale(0.95);
        }
        
        /* ============ ОСНОВНОЙ КОНТЕНТ ============ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        /* Круглая кнопка с котом - Hamster Style */
        .cat-button-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
        }
        
        .cat-button-glow {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #FFD700, #FFA500, #FF6347, #FFD700);
            animation: rotateGlow 3s linear infinite;
            filter: blur(15px);
            opacity: 0.7;
        }
        
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .cat-button {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a004d, #0d001a);
            border: 4px solid rgba(255, 215, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            z-index: 1;
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
        }
        
        .cat-button:active {
            transform: scale(0.9);
            border-color: #FFD700;
            box-shadow: 
                0 0 50px rgba(255, 215, 0, 0.6),
                0 0 100px rgba(255, 165, 0, 0.4),
                inset 0 0 50px rgba(255, 215, 0, 0.2);
        }
        
        .cat-emoji {
            font-size: 120px;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }
        
        .cat-button:active .cat-emoji {
            transform: scale(1.1);
        }
        
        /* Эффекты частиц при клике */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: particleBurst 0.8s ease-out;
            font-weight: bold;
            font-size: 18px;
        }
        
        @keyframes particleBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }
        
        .click-text {
            position: fixed;
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
            pointer-events: none;
            z-index: 101;
            animation: floatUp 1s ease-out;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.5);
            }
        }
        
        /* ============ НИЖНЕЕ МЕНЮ ============ */
        .bottom-nav {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 15px;
        }
        
        .nav-tab {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .nav-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .nav-tab .icon {
            font-size: 22px;
        }
        
        /* ============ КОНТЕНТ ВКЛАДОК ============ */
        .tab-content {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }
        
        /* Стили для списка друзей */
        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .friend-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .friend-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .friend-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .friend-level {
            font-size: 12px;
            color: #aaa;
        }
        
        .friend-pnl {
            font-size: 11px;
            color: #00ff88;
        }
        
        .invite-button {
            width: 100%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        
        .invite-button:active {
            transform: scale(0.98);
        }
        
        .no-friends {
            text-align: center;
            color: #888;
            padding: 20px;
            font-size: 14px;
        }
        
        /* Стили для заданий */
        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .task-title {
            font-weight: 600;
            font-size: 15px;
        }
        
        .task-reward {
            color: #FFD700;
            font-weight: 600;
            font-size: 14px;
        }
        
        .task-description {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .task-progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .task-progress-text {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .task-button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }
        
        .task-button.can-claim {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
        }
        
        .task-button.completed {
            background: rgba(255, 255, 255, 0.1);
            color: #888;
        }
        
        .task-button.in-progress {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
        }
        
        /* Сообщение об ошибке */
        .error-message {
            text-align: center;
            padding: 40px 20px;
        }
        
        .error-message h2 {
            color: #FF6347;
            margin-bottom: 10px;
        }
        
        .error-message p {
            color: #aaa;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="app" class="app">
        <!-- Сообщение об ошибке -->
        <div id="errorContent" class="error-message" style="display: none;">
            <h2>❌ Ошибка</h2>
            <p>Пожалуйста, запустите игру через бота в Telegram!</p>
            <p style="margin-top: 15px; font-size: 14px;">
                Нажмите кнопку "Играть" в чате с ботом
            </p>
        </div>
        
        <!-- Игровой контент -->
        <div id="gameContent" style="display: none; width: 100%; height: 100%; flex-direction: column;">
            <!-- Listing Badge -->
            <div class="app-header">
                <div class="listing-badge">🚀 Listing Soon: $PURR</div>
                <div class="passive-income">
                    💎 Пассивный доход: <span id="pnlDisplay">0</span> $PURR/час
                </div>
            </div>
            
            <!-- Статистика -->
            <div class="stats-panel">
                <div class="league-badge" id="leagueBadge">🐱 Бродяга</div>
                <div class="level-info">
                    <span>Уровень <span id="levelDisplay">1</span></span>
                    <span id="levelProgress">0%</span>
                </div>
                <div class="level-bar">
                    <div class="level-progress" id="levelProgressBar" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Баланс и энергия -->
            <div class="balance-row">
                <span class="balance-display" id="balanceDisplay">0 $PURR</span>
                <div class="energy-section">
                    <span class="energy-display">⚡ <span id="energyDisplay">0</span>/<span id="maxEnergyDisplay">1000</span></span>
                    <div class="energy-bar">
                        <div class="energy-fill" id="energyFill" style="width: 100%"></div>
                    </div>
                    <button class="boost-button" id="boostButton">🚀 Boost</button>
                </div>
            </div>
            
            <!-- Контент вкладок -->
            <div class="tab-content active" id="exchangeTab">
                <div class="main-content">
                    <!-- Кнопка кота в стиле Hamster -->
                    <div class="cat-button-wrapper">
                        <div class="cat-button-glow"></div>
                        <button class="cat-button" id="catButton">
                            <span class="cat-emoji">🐱</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="friendsTab">
                <div id="friendsList" class="friends-list">
                    <div class="no-friends">Загрузка...</div>
                </div>
                <button class="invite-button" id="inviteButton">
                    🔗 Пригласить друга (+5000 $PURR)
                </button>
            </div>
            
            <div class="tab-content" id="tasksTab">
                <div id="tasksList" class="tasks-list">
                    <div class="no-friends">Загрузка заданий...</div>
                </div>
            </div>
            
            <!-- Нижнее меню -->
            <div class="bottom-nav">
                <button class="nav-tab active" data-tab="exchange">
                    <span class="icon">🏠</span>
                    Exchange
                </button>
                <button class="nav-tab" data-tab="friends">
                    <span class="icon">👥</span>
                    Friends
                </button>
                <button class="nav-tab" data-tab="tasks">
                    <span class="icon">📋</span>
                    Tasks
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============ ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP ============
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Устанавливаем темную тему
        tg.setHeaderColor('#000000');
        tg.setBackgroundColor('#000000');
        
        // ============ ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ ============
        let userId = null;
        let isInTelegram = false;
        
        // Проверяем, запущено ли приложение внутри Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            isInTelegram = true;
            console.log('✅ Запущено в Telegram, user_id:', userId);
        } else {
            const urlParams = new URLSearchParams(window.location.search);
            const urlUserId = urlParams.get('user_id');
            if (urlUserId) {
                userId = parseInt(urlUserId);
                isInTelegram = true;
                console.log('⚠️ user_id получен из URL:', userId);
            } else {
                console.error('❌ Не найден user_id в initDataUnsafe или URL');
            }
        }
        
        console.log('🔍 Итоговый userId:', userId, 'isInTelegram:', isInTelegram);
        
        // ============ СОСТОЯНИЕ ИГРЫ ============
        let gameState = {
            balance: 0,
            energy: 1000,
            maxEnergy: 1000,
            level: 1,
            clicks: 0,
            referrals: 0,
            league: '🐱 Бродяга',
            pnl: 0,
            passiveIncomeEarned: 0
        };
        
        const API_URL = window.location.origin;
        console.log('🌐 API_URL:', API_URL);
        
        // ============ ФУНКЦИИ API ============
        
        // Загрузка данных пользователя
        async function loadUserData() {
            if (!userId) {
                console.error('❌ loadUserData: userId не установлен');
                return;
            }
            
            try {
                console.log('📡 Загрузка данных для user_id:', userId);
                const response = await fetch(`${API_URL}/api/user/${userId}`);
                console.log('📡 Ответ сервера:', response.status, response.statusText);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('📊 Получены данные:', data);
                    
                    gameState = {
                        balance: data.balance || 0,
                        energy: data.energy || 1000,
                        maxEnergy: data.max_energy || 1000,
                        level: data.level || 1,
                        clicks: data.clicks || 0,
                        referrals: data.referrals_count || 0,
                        league: data.league || '🐱 Бродяга',
                        pnl: data.pnl || 0,
                        passiveIncomeEarned: data.passive_income_earned || 0
                    };
                    
                    console.log('✅ gameState обновлен:', gameState);
                    updateUI();
                } else {
                    console.error('❌ Ошибка загрузки данных:', response.status, response.statusText);
                    const errorText = await response.text();
                    console.error('❌ Тело ошибки:', errorText);
                }
            } catch (error) {
                console.error('❌ Ошибка сети при загрузке данных:', error);
            }
        }
        
        // Обработка кликов
        async function handleClick() {
            if (!userId) {
                console.error('❌ handleClick: userId не установлен');
                return false;
            }
            
            if (gameState.energy < 1) {
                console.log('⚠️ Недостаточно энергии:', gameState.energy);
                return false;
            }
            
            try {
                console.log('👆 Отправка клика: user_id=' + userId + ', clicks=1');
                const response = await fetch(`${API_URL}/api/click`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        clicks_count: 1,
                        client_timestamp: Date.now() / 1000
                    })
                });
                
                console.log('📡 Ответ на клик:', response.status, response.statusText);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('📊 Данные после клика:', data);
                    
                    if (data.success) {
                        gameState.balance = data.balance;
                        gameState.energy = data.energy;
                        gameState.level = data.level;
                        gameState.clicks = data.clicks;
                        gameState.league = data.league;
                        gameState.pnl = data.pnl || gameState.pnl;
                        console.log('✅ Клик обработан успешно');
                        return true;
                    } else {
                        console.log('⚠️ Клик не обработан:', data.message);
                        if (data.energy !== undefined) {
                            gameState.energy = data.energy;
                        }
                        return false;
                    }
                } else {
                    const errorText = await response.text();
                    console.error('❌ Ошибка при клике:', response.status, errorText);
                    return false;
                }
            } catch (error) {
                console.error('❌ Ошибка сети при клике:', error);
                return false;
            }
        }
        
        // Загрузка списка друзей
        async function loadReferrals() {
            if (!userId) return;
            
            try {
                console.log('📡 Загрузка списка друзей...');
                const response = await fetch(`${API_URL}/api/referrals/${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    console.log('👥 Получены друзья:', data);
                    renderFriendsList(data.referrals);
                }
            } catch (error) {
                console.error('❌ Ошибка загрузки друзей:', error);
            }
        }
        
        // Загрузка заданий
        async function loadTasks() {
            if (!userId) return;
            
            try {
                console.log('📡 Загрузка заданий...');
                const response = await fetch(`${API_URL}/api/tasks/${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    console.log('📋 Получены задания:', data);
                    renderTasksList(data.tasks);
                }
            } catch (error) {
                console.error('❌ Ошибка загрузки заданий:', error);
            }
        }
        
        // Выполнение задания
        async function completeTask(taskId) {
            if (!userId) return;
            
            try {
                console.log('📡 Выполнение задания:', taskId);
                const response = await fetch(`${API_URL}/api/tasks/${userId}/complete/${taskId}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('🎉 Результат задания:', data);
                    
                    if (data.success) {
                        gameState.balance = data.balance;
                        updateUI();
                        
                        if (tg.showPopup) {
                            tg.showPopup({
                                title: '🎉 Задание выполнено!',
                                message: data.message,
                                buttons: [{id: 'ok', type: 'default', text: 'OK'}]
                            });
                        }
                    } else {
                        if (tg.showPopup) {
                            tg.showPopup({
                                title: '❌ Ошибка',
                                message: data.message,
                                buttons: [{id: 'ok', type: 'default', text: 'OK'}]
                            });
                        }
                    }
                }
                
                await loadTasks();
            } catch (error) {
                console.error('❌ Ошибка выполнения задания:', error);
            }
        }
        
        // ============ ФУНКЦИИ UI ============
        
        // Обновление основного интерфейса
        function updateUI() {
            console.log('🔄 Обновление UI...');
            
            // Баланс
            document.getElementById('balanceDisplay').textContent = gameState.balance.toLocaleString() + ' $PURR';
            
            // Энергия
            document.getElementById('energyDisplay').textContent = gameState.energy;
            document.getElementById('maxEnergyDisplay').textContent = gameState.maxEnergy;
            const energyPercent = (gameState.energy / gameState.maxEnergy) * 100;
            document.getElementById('energyFill').style.width = energyPercent + '%';
            
            // Уровень и лига
            document.getElementById('levelDisplay').textContent = gameState.level;
            document.getElementById('leagueBadge').textContent = gameState.league;
            
            // Прогресс уровня
            const currentLevelThreshold = gameState.level * 1000;
            const progressInLevel = gameState.balance % currentLevelThreshold;
            const progressPercent = (progressInLevel / currentLevelThreshold) * 100;
            document.getElementById('levelProgress').textContent = Math.floor(progressPercent) + '%';
            document.getElementById('levelProgressBar').style.width = progressPercent + '%';
            
            // Пассивный доход
            document.getElementById('pnlDisplay').textContent = gameState.pnl;
            
            console.log('✅ UI обновлен');
        }
        
        // Создание эффекта "+1" при клике
        function createClickEffect(x, y, amount) {
            // Текст "+1 $PURR"
            const textElement = document.createElement('div');
            textElement.className = 'click-text';
            textElement.textContent = '+' + amount + ' $PURR';
            textElement.style.left = (x - 40) + 'px';
            textElement.style.top = (y - 40) + 'px';
            document.body.appendChild(textElement);
            
            // Частицы (звездочки, лапки)
            const particles = ['✨', '⭐', '🐾', '💫', '🌟', '🐟'];
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = particles[i];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = (Math.PI * 2 * i) / 6;
                const distance = 40 + Math.random() * 30;
                particle.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
            
            setTimeout(() => {
                textElement.remove();
            }, 1000);
        }
        
        // Отрисовка списка друзей
        function renderFriendsList(referrals) {
            const container = document.getElementById('friendsList');
            
            if (!referrals || referrals.length === 0) {
                container.innerHTML = `
                    <div class="no-friends">
                        <div style="font-size: 48px; margin-bottom: 10px;">👥</div>
                        <div>У вас пока нет друзей</div>
                        <div style="font-size: 12px; margin-top: 5px; color: #666;">
                            Пригласите друга и получите 5000 $PURR!
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = referrals.map(friend => `
                <div class="friend-item">
                    <div class="friend-info">
                        <div class="friend-avatar">🐱</div>
                        <div>
                            <div class="friend-name">${friend.first_name || 'Игрок'}</div>
                            <div class="friend-level">Уровень: ${friend.level || 1}</div>
                            ${friend.pnl ? `<div class="friend-pnl">💎 ${friend.pnl} $PURR/час</div>` : ''}
                        </div>
                    </div>
                    <div style="color: #FFD700; font-size: 14px;">+5000 $PURR</div>
                </div>
            `).join('');
        }
        
        // Отрисовка списка заданий
        function renderTasksList(tasks) {
            const container = document.getElementById('tasksList');
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="no-friends">Нет доступных заданий</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                let buttonClass = 'task-button';
                let buttonText = 'Выполняется...';
                let disabled = true;
                let onclick = '';
                
                if (task.completed) {
                    buttonClass += ' completed';
                    buttonText = '✅ Выполнено';
                } else if (task.progress >= task.target) {
                    buttonClass += ' can-claim';
                    buttonText = '🎁 Получить ' + task.reward + ' $PURR';
                    disabled = false;
                    onclick = `completeTask(${task.id})`;
                } else {
                    buttonClass += ' in-progress';
                    buttonText = task.progress + '/' + task.target;
                }
                
                return `
                    <div class="task-item">
                        <div class="task-header">
                            <div class="task-title">${task.title}</div>
                            <div class="task-reward">+${task.reward} $PURR</div>
                        </div>
                        <div class="task-description">${task.description}</div>
                        <div class="task-progress-bar">
                            <div class="task-progress-fill" style="width: ${task.progress_percent}%"></div>
                        </div>
                        <div class="task-progress-text">${task.progress}/${task.target}</div>
                        <button class="${buttonClass}" 
                                onclick="${onclick}"
                                ${disabled ? 'disabled' : ''}>
                            ${buttonText}
                        </button>
                    </div>
                `;
            }).join('');
        }
        
        // ============ ОБРАБОТЧИКИ СОБЫТИЙ ============
        
        // Клик по коту
        document.getElementById('catButton').addEventListener('click', async function(e) {
            console.log('👆 Клик по коту! Энергия:', gameState.energy);
            
            if (gameState.energy < 1) {
                console.log('⚠️ Нет энергии для клика');
                if (tg.showPopup) {
                    tg.showPopup({
                        title: '😴 Нет энергии',
                        message: 'Подождите, энергия восстанавливается со временем',
                        buttons: [{id: 'ok', type: 'default', text: 'OK'}]
                    });
                }
                return;
            }
            
            const success = await handleClick();
            console.log('📊 Результат клика:', success);
            
            if (success) {
                updateUI();
                
                // Создаем эффекты
                const levelBonus = Math.floor(gameState.level * 0.5);
                createClickEffect(e.clientX, e.clientY, 1 + levelBonus);
                
                // Виброотклик
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            }
        });
        
        // Boost кнопка
        document.getElementById('boostButton').addEventListener('click', function() {
            if (tg.showPopup) {
                tg.showPopup({
                    title: '🚀 Boost',
                    message: 'Полная энергия восстановлена!',
                    buttons: [{id: 'ok', type: 'default', text: 'OK'}]
                });
            }
            gameState.energy = gameState.maxEnergy;
            updateUI();
        });
        
        // Навигация по вкладкам
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                console.log('📑 Переключение на вкладку:', tabName);
                
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(tabName + 'Tab').classList.add('active');
                
                if (tabName === 'friends') {
                    loadReferrals();
                } else if (tabName === 'tasks') {
                    loadTasks();
                }
            });
        });
        
        // Кнопка приглашения
        document.getElementById('inviteButton').addEventListener('click', function() {
            const botUsername = 'ваш_бот'; // Замените на username вашего бота
            const refLink = `https://t.me/${botUsername}?start=${userId}`;
            
            if (tg.openTelegramLink) {
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent('🐱 Играй в $PURR Clicker со мной! Listing Soon!')}`);
            } else if (tg.showPopup) {
                tg.showPopup({
                    title: '🔗 Реферальная ссылка',
                    message: refLink,
                    buttons: [
                        {id: 'copy', type: 'default', text: 'Скопировать'},
                        {id: 'close', type: 'cancel', text: 'Закрыть'}
                    ]
                });
            }
        });
        
        // ============ ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ============
        
        function initApp() {
            console.log('🚀 Инициализация приложения...');
            console.log('📱 isInTelegram:', isInTelegram);
            console.log('👤 userId:', userId);
            
            if (isInTelegram && userId) {
                document.getElementById('gameContent').style.display = 'flex';
                document.getElementById('errorContent').style.display = 'none';
                
                // Загружаем данные
                loadUserData();
                
                // Периодическое обновление для пассивного дохода
                setInterval(() => {
                    console.log('🔄 Периодическое обновление данных...');
                    loadUserData();
                }, 30000);
                
                // Обновление энергии локально
                setInterval(() => {
                    if (gameState.energy < gameState.maxEnergy) {
                        gameState.energy = Math.min(gameState.maxEnergy, gameState.energy + 3);
                        updateUI();
                    }
                }, 3000);
                
                console.log('✅ Приложение инициализировано успешно');
            } else {
                document.getElementById('gameContent').style.display = 'none';
                document.getElementById('errorContent').style.display = 'block';
                console.error('❌ Приложение не в Telegram или отсутствует userId');
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        // Глобальный обработчик ошибок
        window.addEventListener('error', function(e) {
            console.error('🚨 Глобальная ошибка:', e.message, e.filename, e.lineno);
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            console.error('🚨 Необработанное отклонение промиса:', e.reason);
        });
    </script>
</body>
</html>
