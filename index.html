<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐱 Кот-Кликер</title>
    
    <!-- Подключение Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .cat-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .cat-container:active {
            transform: scale(0.95);
        }
        
        .cat {
            font-size: 150px;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }
        
        .click-effect {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
        
        .level-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.3s;
            border-radius: 5px;
        }
        
        .friends-button {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: background 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .friends-button:hover {
            background: #128C7E;
        }
        
        .friends-button:active {
            transform: scale(0.98);
        }
        
        .level-up {
            animation: levelUp 0.5s ease-out;
        }
        
        @keyframes levelUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .error-message {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 90%;
        }
        
        .error-message h2 {
            color: #e74c3c;
            margin-bottom: 10px;
        }
        
        .error-message p {
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Основной контент -->
        <div id="gameContent" class="container" style="display: none;">
            <div class="stats">
                <div class="stat-item">
                    <span>🐟</span>
                    <span id="balance">0</span>
                </div>
                <div class="stat-item">
                    <span>⭐</span>
                    <span id="level">1</span>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="progressBar" style="width: 0%"></div>
            </div>
            
            <div class="cat-container" id="catContainer">
                <div class="cat" id="cat">🐱</div>
            </div>
            
            <button class="friends-button" id="friendsButton">
                👥 Друзья: <span id="friendsCount">0</span>
            </button>
        </div>
        
        <!-- Сообщение об ошибке -->
        <div id="errorContent" class="error-message" style="display: none;">
            <h2>❌ Ошибка</h2>
            <p>Пожалуйста, запустите игру через бота в Telegram!</p>
            <p style="margin-top: 15px; font-size: 14px;">
                Нажмите кнопку "Играть" в чате с ботом
            </p>
        </div>
    </div>

    <script>
        // ============ ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP ============
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        
        // Разворачиваем на весь экран
        tg.expand();
        
        // Устанавливаем цвет заголовка (опционально)
        tg.setHeaderColor('#764ba2');
        
        // ============ ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ ============
        let userId = null;
        let isInTelegram = false;
        
        // Проверяем, запущено ли приложение внутри Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            // Получаем user_id из initData (самый надежный способ)
            userId = tg.initDataUnsafe.user.id;
            isInTelegram = true;
            console.log('✅ Запущено в Telegram, user_id:', userId);
        } else {
            // Пробуем получить из URL как запасной вариант
            const urlParams = new URLSearchParams(window.location.search);
            const urlUserId = urlParams.get('user_id');
            
            if (urlUserId) {
                userId = parseInt(urlUserId);
                isInTelegram = true;
                console.log('⚠️ user_id получен из URL:', userId);
            }
        }
        
        // ============ СОСТОЯНИЕ ИГРЫ ============
        let gameState = {
            balance: 0,
            level: 1,
            clicks: 0,
            referrals: 0
        };
        
        // API базовый URL
        const API_URL = window.location.origin;
        
        // ============ ФУНКЦИИ API ============
        
        // Загрузка данных пользователя
        async function loadUserData() {
            if (!userId) return;
            
            try {
                const response = await fetch(`${API_URL}/api/user/${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    gameState = {
                        balance: data.balance || 0,
                        level: data.level || 1,
                        clicks: data.clicks || 0,
                        referrals: data.referrals_count || 0
                    };
                    updateUI();
                    console.log('📊 Данные загружены:', gameState);
                } else {
                    console.error('Ошибка загрузки данных. Статус:', response.status);
                }
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }
        
        // Отправка кликов на сервер
        async function syncClicks() {
            if (!userId) return;
            
            try {
                const response = await fetch(`${API_URL}/api/click`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        clicks: gameState.clicks
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    gameState.balance = data.balance;
                    gameState.level = data.level;
                    gameState.clicks = data.clicks;
                    updateUI();
                }
            } catch (error) {
                console.error('Ошибка синхронизации:', error);
            }
        }
        
        // ============ ФУНКЦИИ UI ============
        
        // Обновление интерфейса
        function updateUI() {
            document.getElementById('balance').textContent = gameState.balance.toLocaleString();
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('friendsCount').textContent = gameState.referrals;
            
            // Прогресс до следующего уровня
            const currentLevel = gameState.level;
            const progressInLevel = gameState.balance % (currentLevel * 1000);
            const progress = (progressInLevel / (currentLevel * 1000)) * 100;
            document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
        }
        
        // Создание эффекта при клике
        function createClickEffect(x, y, amount) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.textContent = '+' + amount;
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.querySelector('.cat-container').appendChild(effect);
            
            setTimeout(() => {
                effect.remove();
            }, 800);
        }
        
        // ============ ОБРАБОТЧИКИ СОБЫТИЙ ============
        
        // Обработчик клика по коту
        document.getElementById('catContainer').addEventListener('click', async function(e) {
            const oldLevel = gameState.level;
            
            // Увеличиваем счетчики
            gameState.clicks++;
            const levelBonus = Math.floor(gameState.level * 0.5);
            const earned = 1 + levelBonus;
            gameState.balance += earned;
            
            // Проверка повышения уровня
            if (gameState.balance >= gameState.level * 1000) {
                gameState.level++;
                
                // Анимация повышения уровня
                const catElement = document.getElementById('cat');
                catElement.classList.add('level-up');
                setTimeout(() => {
                    catElement.classList.remove('level-up');
                }, 500);
                
                // Виброотклик при повышении уровня (если доступно)
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } else {
                // Легкий виброотклик при обычном клике
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            }
            
            // Создаем визуальный эффект
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createClickEffect(x, y, earned);
            
            updateUI();
            
            // Синхронизируем с сервером каждые 10 кликов
            if (gameState.clicks % 10 === 0) {
                await syncClicks();
            }
        });
        
        // Обработчик кнопки друзей
        document.getElementById('friendsButton').addEventListener('click', function() {
            if (tg.showPopup) {
                tg.showPopup({
                    title: '👥 Реферальная система',
                    message: `Вы пригласили: ${gameState.referrals} друзей\n\n` +
                             `🎁 За каждого друга вы получаете 5000 рыбок\n` +
                             `🎉 Ваш друг получает 2000 рыбок\n\n` +
                             `💰 Всего заработано: ${gameState.referrals * 5000} рыбок`,
                    buttons: [
                        {id: 'ok', type: 'default', text: 'ОК'}
                    ]
                });
            } else {
                alert('👥 У вас ' + gameState.referrals + ' друзей\n\nПриглашайте друзей и получайте бонусы!');
            }
        });
        
        // ============ ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ============
        
        function initApp() {
            if (isInTelegram && userId) {
                // Показываем игровой контент
                document.getElementById('gameContent').style.display = 'block';
                document.getElementById('errorContent').style.display = 'none';
                
                // Загружаем данные пользователя
                loadUserData();
                
                // Настраиваем кнопку "Назад" в Telegram
                tg.BackButton.show();
                tg.BackButton.onClick(() => {
                    tg.close();
                });
                
                // Сохраняем прогресс при закрытии
                window.addEventListener('beforeunload', async () => {
                    await syncClicks();
                });
                
                // Сохраняем прогресс при сворачивании
                document.addEventListener('visibilitychange', async () => {
                    if (document.hidden) {
                        await syncClicks();
                    }
                });
                
                console.log('🎮 Игра инициализирована для пользователя:', userId);
            } else {
                // Показываем сообщение об ошибке
                document.getElementById('gameContent').style.display = 'none';
                document.getElementById('errorContent').style.display = 'block';
                console.log('❌ Приложение запущено не в Telegram');
            }
        }
        
        // Запускаем приложение после полной загрузки страницы
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        // ============ ДЛЯ ТЕСТИРОВАНИЯ В БРАУЗЕРЕ ============
        // Раскомментируйте для тестирования без Telegram
        /*
        if (!isInTelegram) {
            userId = 123456789; // Замените на ID тестового пользователя
            isInTelegram = true;
            initApp();
        }
        */
    </script>
</body>
</html>
