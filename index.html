<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NODE Miner</title>
    <style>
        /* ==============================
           НОВЫЙ ПРЕМИАЛЬНЫЙ ДИЗАЙН
           ============================== */
        :root {
            --bg-gradient: linear-gradient(145deg, #0a0e17 0%, #111b2b 100%);
            --glass-bg: rgba(15, 25, 45, 0.65);
            --glass-border: rgba(100, 150, 255, 0.2);
            --neon-blue: #4a9eff;
            --neon-cyan: #00e5ff;
            --neon-purple: #b44dff;
            --neon-gold: #f0b90b;
            --text-primary: #ffffff;
            --text-secondary: #a0b5d0;
            --energy-color: #00e676;
            --danger: #ff4d6a;
            --card-bg: rgba(10, 20, 35, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: transparent;
            box-shadow: 0 0 60px rgba(0, 180, 255, 0.15);
        }

        /* Верхняя панель */
        .top-panel {
            padding: 25px 20px 20px;
            background: transparent;
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .balance-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .balance-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
            line-height: 1;
            word-break: break-word;
        }

        .pph-badge {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 10px 22px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        .pph-value {
            color: var(--neon-gold);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(240, 185, 11, 0.6);
        }

        /* Основная область */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 90px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Майнинг */
        .miner-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        /* 3D монета/нода */
        .clicker-button {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffd966, #d4a017);
            border: 4px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 50px rgba(0, 160, 255, 0.5), 0 20px 30px rgba(0,0,0,0.6), inset 0 -8px 0 rgba(0,0,0,0.4);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease, box-shadow 0.1s;
            font-size: 4rem;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            animation: pulse-glow 2.5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 30px rgba(0, 200, 255, 0.5), 0 20px 30px rgba(0,0,0,0.6), inset 0 -8px 0 rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 70px rgba(0, 180, 255, 0.9), 0 20px 30px rgba(0,0,0,0.6), inset 0 -8px 0 rgba(0,0,0,0.4); }
            100% { box-shadow: 0 0 30px rgba(0, 200, 255, 0.5), 0 20px 30px rgba(0,0,0,0.6), inset 0 -8px 0 rgba(0,0,0,0.4); }
        }

        .clicker-button:active {
            transform: scale(0.88);
            box-shadow: 0 0 90px rgba(0, 220, 255, 1), 0 10px 20px rgba(0,0,0,0.8), inset 0 -4px 0 rgba(0,0,0,0.5);
        }

        .clicker-button.disabled {
            background: radial-gradient(circle at 35% 30%, #5a5a5a, #2d2d2d);
            border-color: #444;
            box-shadow: 0 0 20px rgba(100,100,100,0.3);
            animation: none;
            cursor: not-allowed;
        }

        /* Энергия */
        .energy-container {
            width: 90%;
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .energy-icon {
            font-size: 1.5rem;
            color: var(--energy-color);
            text-shadow: 0 0 12px var(--energy-color);
        }

        .energy-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .energy-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00e676, #00c853);
            box-shadow: 0 0 12px #00e676;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .energy-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: right;
            min-width: 80px;
        }

        /* Glassmorphism нижнее меню */
        .bottom-nav {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 390px;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 10px 5px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .nav-btn.active {
            color: #fff;
            background: rgba(74, 158, 255, 0.15);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .nav-icon {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 6px currentColor);
        }

        /* Карточки магазина (для консистентности) */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: rgba(74, 158, 255, 0.25);
            color: white;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.3);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .card-item {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 22px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card-item.owned {
            border-color: rgba(240, 185, 11, 0.5);
            box-shadow: 0 0 20px rgba(240, 185, 11, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .card-level {
            background: rgba(255,255,255,0.08);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .card-profit {
            color: #00e676;
            font-weight: 600;
        }

        .upgrade-btn {
            background: var(--neon-blue);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.3);
        }

        .upgrade-btn:active {
            background: #3a7ed9;
            box-shadow: 0 2px 10px rgba(74, 158, 255, 0.5);
        }

        .upgrade-btn:disabled {
            background: #2a3344;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Комбо и награды */
        .combo-section {
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }

        .daily-reward-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 18px;
        }

        .day-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .day-cell.claimed {
            background: rgba(0, 230, 118, 0.15);
            cursor: default;
        }

        .day-cell.today {
            border-color: #f0b90b;
            background: rgba(240, 185, 11, 0.1);
            box-shadow: 0 0 15px rgba(240, 185, 11, 0.3);
        }

        .day-reward {
            font-weight: bold;
            font-size: 0.6rem;
        }

        .combo-cards {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .combo-card {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
            font-size: 0.75rem;
            border: 1px solid transparent;
        }

        .combo-card.completed {
            border-color: #00e676;
            background: rgba(0, 230, 118, 0.1);
        }

        .claim-combo-btn, .claim-daily-btn {
            width: 100%;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.95rem;
        }

        .claim-daily-btn {
            background: #00c853;
        }

        .claim-combo-btn {
            background: #f0b90b;
        }

        .claim-combo-btn:disabled, .claim-daily-btn:disabled {
            background: #2a3344;
            cursor: not-allowed;
        }

        /* Статистика */
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-weight: 700;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px 16px;
            border-radius: 12px;
            margin-top: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .modal h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .modal .close-btn {
            background: var(--neon-blue);
            border: none;
            color: white;
            padding: 14px 30px;
            border-radius: 18px;
            margin-top: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.4);
        }

        /* Партиклы */
        .float-particle {
            position: fixed;
            pointer-events: none;
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-gold);
            animation: floatUp 0.9s ease-out forwards;
            z-index: 999;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-90px) scale(0.6); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Верхняя панель -->
    <div class="top-panel">
        <div class="balance-container">
            <div class="balance-label">$NODE</div>
            <div class="balance-amount" id="balanceDisplay">0</div>
        </div>
        <div style="display: flex; justify-content: center;">
            <div class="pph-badge">
                <span>⚡ Прибыль в час</span>
                <span class="pph-value" id="pphDisplay">0</span>
            </div>
        </div>
    </div>

    <!-- Вкладки -->
    <div class="tab-content active" id="miningTab">
        <div class="miner-center">
            <button class="clicker-button" id="clickerBtn">
                ⚛️
            </button>
            <div class="energy-container">
                <span class="energy-icon">⚡</span>
                <div class="energy-bar">
                    <div class="energy-fill" id="energyFill" style="width: 100%;"></div>
                </div>
                <span class="energy-text" id="energyText">1000 / 1000</span>
            </div>
        </div>
    </div>

    <div class="tab-content" id="shopTab">
        <div class="filter-bar">
            <button class="filter-btn active" data-category="all">Все</button>
            <button class="filter-btn" data-category="hardware">Железо</button>
            <button class="filter-btn" data-category="software">Софт</button>
            <button class="filter-btn" data-category="marketing">Маркетинг</button>
        </div>
        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <div class="tab-content" id="comboTab">
        <div class="combo-section">
            <div class="section-title">🎁 Ежедневная награда</div>
            <div class="daily-reward-grid" id="dailyRewardGrid"></div>
            <button class="claim-daily-btn" id="claimDailyBtn" disabled>Забрать награду</button>
        </div>
        <div class="combo-section">
            <div class="section-title">🔥 Комбо дня</div>
            <div class="combo-cards" id="comboCardsContainer"></div>
            <button class="claim-combo-btn" id="claimComboBtn" disabled>Получить бонус (50 000 $NODE)</button>
        </div>
    </div>

    <div class="tab-content" id="statsTab">
        <div class="stat-item"><span>Общий PPH</span><span class="stat-value" id="statPPH">0</span></div>
        <div class="stat-item"><span>Куплено карточек</span><span class="stat-value" id="statCards">0</span></div>
        <div class="stat-item"><span>Всего кликов</span><span class="stat-value" id="statClicks">0</span></div>
        <button class="reset-btn" id="resetBtn">Сбросить прогресс</button>
    </div>

    <!-- Glassmorphism нижнее меню -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-tab="miningTab">
            <span class="nav-icon">⛏️</span> Майнинг
        </button>
        <button class="nav-btn" data-tab="shopTab">
            <span class="nav-icon">🛒</span> Магазин
        </button>
        <button class="nav-btn" data-tab="comboTab">
            <span class="nav-icon">🎯</span> Комбо
        </button>
        <button class="nav-btn" data-tab="statsTab">
            <span class="nav-icon">📊</span> Статистика
        </button>
    </div>
</div>

<!-- Модальное окно оффлайн-дохода -->
<div id="offlineModal" class="modal-overlay" style="display: none;">
    <div class="modal">
        <h3>⏳ Пока вас не было</h3>
        <p>Вы заработали <span id="offlineAmount">0</span> $NODE</p>
        <button class="close-btn" id="closeOfflineModal">Забрать</button>
    </div>
</div>

        { id: 'sw15', name: 'Нейро-Консенсус (AI)', category: 'software', baseCost: 5000000, baseProfit: 500000 },
        { id: 'mk1', name: 'Twitter Инфлюенсер', category: 'marketing', baseCost: 40, baseProfit: 3 },
        { id: 'mk2', name: 'Discord Комьюнити', category: 'marketing', baseCost: 150, baseProfit: 15 },
        { id: 'mk3', name: 'YouTube Обзор Ноды', category: 'marketing', baseCost: 400, baseProfit: 42 },
        { id: 'mk4', name: 'Telegram Амбассадор', category: 'marketing', baseCost: 1000, baseProfit: 105 },
        { id: 'mk5', name: 'Партнерская Программа', category: 'marketing', baseCost: 2500, baseProfit: 260 },
        { id: 'mk6', name: 'Аирдроп Кампания', category: 'marketing', baseCost: 6000, baseProfit: 630 },
        { id: 'mk7', name: 'Реферальная Система', category: 'marketing', baseCost: 14000, baseProfit: 1500 },
        { id: 'mk8', name: 'Медиа-Кит Проекта', category: 'marketing', baseCost: 32000, baseProfit: 3400 },
        { id: 'mk9', name: 'Хакатон Спонсорство', category: 'marketing', baseCost: 75000, baseProfit: 8000 },
        { id: 'mk10', name: 'Whitepaper 2.0', category: 'marketing', baseCost: 170000, baseProfit: 18000 },
        { id: 'mk11', name: 'Листинг на CoinMarketCap', category: 'marketing', baseCost: 380000, baseProfit: 40000 },
        { id: 'mk12', name: 'AMA Сессия (Twitter Space)', category: 'marketing', baseCost: 850000, baseProfit: 90000 },
        { id: 'mk13', name: 'Кросс-чейн Партнерство', category: 'marketing', baseCost: 1900000, baseProfit: 200000 }
    ];

    // ==============================
    // СОСТОЯНИЕ ИГРЫ (без изменений)
    // ==============================
    const DEFAULT_STATE = {
        balance: 100,
        totalPPH: 0,
        lastLogin: Date.now(),
        energy: 1000,
        lastEnergyUpdate: Date.now(),
        cards: [],
        dailyRewardDay: 0,
        dailyRewardClaimed: false,
        lastDailyRewardDate: null,
        dailyComboDate: null,
        dailyComboCards: [],
        dailyComboClaimed: false,
        totalClicks: 0
    };

    let gameState = JSON.parse(JSON.stringify(DEFAULT_STATE));

    // DOM элементы
    const balanceDisplay = document.getElementById('balanceDisplay');
    const pphDisplay = document.getElementById('pphDisplay');
    const energyFill = document.getElementById('energyFill');
    const energyText = document.getElementById('energyText');
    const clickerBtn = document.getElementById('clickerBtn');
    const cardsContainer = document.getElementById('cardsContainer');
    const dailyRewardGrid = document.getElementById('dailyRewardGrid');
    const claimDailyBtn = document.getElementById('claimDailyBtn');
    const claimComboBtn = document.getElementById('claimComboBtn');
    const comboCardsContainer = document.getElementById('comboCardsContainer');
    const statPPH = document.getElementById('statPPH');
    const statCards = document.getElementById('statCards');
    const statClicks = document.getElementById('statClicks');
    const offlineModal = document.getElementById('offlineModal');
    const offlineAmount = document.getElementById('offlineAmount');
    const closeOfflineModal = document.getElementById('closeOfflineModal');

    // ==============================
    // ФУНКЦИИ (без изменений)
    // ==============================
    function formatNumber(num) {
        if (num >= 1e6) return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
        if (num >= 1e3) return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
        return Math.floor(num).toLocaleString('ru-RU');
    }

    function getCardData(id) {
        return cardsData.find(c => c.id === id);
    }

    function getPlayerCard(id) {
        return gameState.cards.find(c => c.id === id);
    }

    function getCardProfit(id, level) {
        const card = getCardData(id);
        if (!card || level < 1) return 0;
        return card.baseProfit * level * (1 + 0.15 * (level - 1));
    }

    function calculateTotalPPH() {
        let total = 0;
        gameState.cards.forEach(c => {
            total += getCardProfit(c.id, c.level);
        });
        gameState.totalPPH = total;
    }

    function getUpgradeCost(id, currentLevel) {
        const card = getCardData(id);
        if (!card) return Infinity;
        return Math.floor(card.baseCost * Math.pow(1.5, currentLevel));
    }

    function saveGame() {
        localStorage.setItem('nodeMinerState', JSON.stringify(gameState));
    }

    function loadGame() {
        const saved = localStorage.getItem('nodeMinerState');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                gameState = Object.assign({}, DEFAULT_STATE, parsed);
                if (!Array.isArray(gameState.cards)) gameState.cards = [];
                if (!Array.isArray(gameState.dailyComboCards)) gameState.dailyComboCards = [];
            } catch (e) {
                console.error('Ошибка загрузки сохранения', e);
                gameState = JSON.parse(JSON.stringify(DEFAULT_STATE));
            }
        }
        calculateTotalPPH();
    }

    function processOfflineIncome() {
        const now = Date.now();
        let deltaSeconds = (now - gameState.lastLogin) / 1000;
        if (deltaSeconds < 0) deltaSeconds = 0;
        const maxSeconds = 86400;
        if (deltaSeconds > maxSeconds) deltaSeconds = maxSeconds;
        if (deltaSeconds > 0 && gameState.totalPPH > 0) {
            const earned = (gameState.totalPPH / 3600) * deltaSeconds;
            gameState.balance += earned;
            return earned;
        }
        return 0;
    }

    function restoreEnergy() {
        const now = Date.now();
        let deltaSeconds = (now - gameState.lastEnergyUpdate) / 1000;
        if (deltaSeconds < 0) deltaSeconds = 0;
        const maxEnergy = 1000;
        const restoreRate = 2;
        const restored = Math.min(deltaSeconds * restoreRate, maxEnergy - gameState.energy);
        if (restored > 0) {
            gameState.energy = Math.min(maxEnergy, gameState.energy + restored);
        }
        gameState.lastEnergyUpdate = now;
    }

    function updateDailyProgress() {
        const today = new Date().toISOString().split('T')[0];
        if (gameState.lastDailyRewardDate !== today) {
            gameState.dailyRewardClaimed = false;
        }
        if (gameState.dailyComboDate !== today) {
            gameState.dailyComboDate = today;
            gameState.dailyComboClaimed = false;
            const categories = ['hardware', 'software', 'marketing'];
            const combo = [];
            categories.forEach(cat => {
                const catCards = cardsData.filter(c => c.category === cat);
                const randomCard = catCards[Math.floor(Math.random() * catCards.length)];
                combo.push(randomCard.id);
            });
            gameState.dailyComboCards = combo;
        }
    }

    function checkDailyComboCompleted() {
        if (!gameState.dailyComboCards.length) return false;
        return gameState.dailyComboCards.every(id => {
            const playerCard = getPlayerCard(id);
            return playerCard && playerCard.level >= 1;
        });
    }

    function clickMine(e) {
        if (gameState.energy < 1) {
            clickerBtn.classList.add('disabled');
            return;
        }
        gameState.energy -= 1;
        gameState.totalClicks += 1;
        const clickValue = 1 + (gameState.totalPPH / 3600) * 10;
        gameState.balance += clickValue;
        saveGame();
        updateUI();

        const rect = clickerBtn.getBoundingClientRect();
        const particle = document.createElement('div');
        particle.className = 'float-particle';
        particle.textContent = '+' + formatNumber(clickValue);
        particle.style.left = rect.left + rect.width/2 - 20 + 'px';
        particle.style.top = rect.top + 'px';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 900);

        if (gameState.energy < 1) {
            clickerBtn.classList.add('disabled');
        }
    }

    function buyUpgrade(cardId) {
        const playerCard = getPlayerCard(cardId);
        const currentLevel = playerCard ? playerCard.level : 0;
        const cost = getUpgradeCost(cardId, currentLevel);
        if (gameState.balance < cost) return;
        gameState.balance -= cost;
        if (!playerCard) {
            gameState.cards.push({ id: cardId, level: 1 });
        } else {
            playerCard.level += 1;
        }
        calculateTotalPPH();
        saveGame();
        updateUI();
        renderShop();
    }

    function claimDailyReward() {
        if (gameState.dailyRewardClaimed) return;
        const rewards = [50, 150, 400, 1000, 3000, 8000, 25000];
        const reward = rewards[gameState.dailyRewardDay];
        gameState.balance += reward;
        gameState.dailyRewardClaimed = true;
        gameState.lastDailyRewardDate = new Date().toISOString().split('T')[0];
        gameState.dailyRewardDay = (gameState.dailyRewardDay + 1) % 7;
        saveGame();
        updateUI();
        renderDailyReward();
        alert(`Получено ${formatNumber(reward)} $NODE!`);
    }

    function claimDailyCombo() {
        if (gameState.dailyComboClaimed || !checkDailyComboCompleted()) return;
        const reward = 50000;
        gameState.balance += reward;
        gameState.dailyComboClaimed = true;
        saveGame();
        updateUI();
        renderCombo();
        alert(`Комбо дня! +${formatNumber(reward)} $NODE`);
    }

    function resetProgress() {
        if (confirm('Вы уверены, что хотите полностью сбросить прогресс?')) {
            gameState = JSON.parse(JSON.stringify(DEFAULT_STATE));
            saveGame();
            updateUI();
            renderShop();
            renderDailyReward();
            renderCombo();
            updateStats();
        }
    }

    function updateUI() {
        balanceDisplay.textContent = formatNumber(gameState.balance);
        pphDisplay.textContent = formatNumber(gameState.totalPPH);
        const energyPercent = (gameState.energy / 1000) * 100;
        energyFill.style.width = energyPercent + '%';
        energyText.textContent = Math.floor(gameState.energy) + ' / 1000';
        clickerBtn.classList.toggle('disabled', gameState.energy < 1);
        statPPH.textContent = formatNumber(gameState.totalPPH);
        statCards.textContent = gameState.cards.filter(c => c.level > 0).length;
        statClicks.textContent = gameState.totalClicks;
    }

    function updateStats() {
        statPPH.textContent = formatNumber(gameState.totalPPH);
        statCards.textContent = gameState.cards.filter(c => c.level > 0).length;
        statClicks.textContent = gameState.totalClicks;
    }

    function renderShop(category = 'all') {
        const filtered = cardsData.filter(c => category === 'all' || c.category === category);
        cardsContainer.innerHTML = filtered.map(card => {
            const playerCard = getPlayerCard(card.id);
            const level = playerCard ? playerCard.level : 0;
            const profit = getCardProfit(card.id, level);
            const nextCost = getUpgradeCost(card.id, level);
            const canAfford = gameState.balance >= nextCost;
            return `
                <div class="card-item ${level > 0 ? 'owned' : ''}">
                    <div class="card-header">
                        <span class="card-title">${card.name}</span>
                        <span class="card-level">Ур. ${level}</span>
                    </div>
                    <div class="card-stats">
                        <span>Прибыль: <span class="card-profit">+${formatNumber(profit)}/ч</span></span>
                    </div>
                    <button class="upgrade-btn" data-id="${card.id}" ${!canAfford ? 'disabled' : ''}>
                        ${level === 0 ? 'Купить' : 'Апгрейд'} (${formatNumber(nextCost)} $NODE)
                    </button>
                </div>
            `;
        }).join('');

        cardsContainer.querySelectorAll('.upgrade-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.dataset.id;
                buyUpgrade(id);
            });
        });
    }

    function renderDailyReward() {
        const rewards = [50, 150, 400, 1000, 3000, 8000, 25000];
        const today = new Date().toISOString().split('T')[0];
        const isTodayClaimed = gameState.dailyRewardClaimed && gameState.lastDailyRewardDate === today;
        let html = '';
        for (let i = 0; i < 7; i++) {
            let classes = 'day-cell';
            if (i < gameState.dailyRewardDay || (i === gameState.dailyRewardDay && isTodayClaimed)) {
                classes += ' claimed';
            }
            if (i === gameState.dailyRewardDay && !isTodayClaimed) {
                classes += ' today';
            }
            html += `<div class="${classes}"><span>День ${i+1}</span><span class="day-reward">${formatNumber(rewards[i])}</span></div>`;
        }
        dailyRewardGrid.innerHTML = html;
        claimDailyBtn.disabled = isTodayClaimed;
        claimDailyBtn.textContent = isTodayClaimed ? 'Награда получена' : 'Забрать награду';
    }

    function renderCombo() {
        if (!gameState.dailyComboCards.length) {
            comboCardsContainer.innerHTML = '<p>Загрузка...</p>';
            return;
        }
        const completed = checkDailyComboCompleted();
        const html = gameState.dailyComboCards.map(id => {
            const card = getCardData(id);
            const playerCard = getPlayerCard(id);
            const hasCard = playerCard && playerCard.level >= 1;
            return `<div class="combo-card ${hasCard ? 'completed' : ''}">${card.name}<br><small>${hasCard ? '✅ Есть' : '❌ Нет'}</small></div>`;
        }).join('');
        comboCardsContainer.innerHTML = html;
        claimComboBtn.disabled = !completed || gameState.dailyComboClaimed;
        claimComboBtn.textContent = gameState.dailyComboClaimed ? 'Бонус получен' : 'Получить бонус (50 000 $NODE)';
    }

    function init() {
        loadGame();
        restoreEnergy();
        const offlineEarned = processOfflineIncome();
        gameState.lastLogin = Date.now();
        updateDailyProgress();
        calculateTotalPPH();
        saveGame();
        updateUI();
        renderShop();
        renderDailyReward();
        renderCombo();
        updateStats();

        if (offlineEarned > 0) {
            offlineAmount.textContent = formatNumber(offlineEarned);
            offlineModal.style.display = 'flex';
        }

        setInterval(() => {
            restoreEnergy();
            updateUI();
            saveGame();
        }, 1000);
    }

    // Привязка событий
    clickerBtn.addEventListener('click', clickMine);

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if (tabId === 'shopTab') renderShop();
            if (tabId === 'comboTab') {
                renderDailyReward();
                renderCombo();
            }
            if (tabId === 'statsTab') updateStats();
        });
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const category = btn.dataset.category;
            renderShop(category);
        });
    });

    claimDailyBtn.addEventListener('click', claimDailyReward);
    claimComboBtn.addEventListener('click', claimDailyCombo);
    document.getElementById('resetBtn').addEventListener('click', resetProgress);
    closeOfflineModal.addEventListener('click', () => {
        offlineModal.style.display = 'none';
    });

    init();
</script>
</body>
</html>
